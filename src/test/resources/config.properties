# ─────────────────────────────────────────────────────────────
#  Trip Planner QA – central configuration
#  Override individual keys with -D flags or CI env vars
# ─────────────────────────────────────────────────────────────

# Browser  (chrome | firefox | edge)
browser=chrome
headless=true

# Base URLs
google.base.url=https://www.google.com
google.flights.url=https://www.google.com/travel/flights

# Default search locations
origin.city=Cairo
origin.iata=CAI
destination.city=Marsa Alam
destination.iata=RMF

# Weather
weather.query=Marsa Alam weather

# Restaurant
restaurant.query=restaurant near Marsa Alam

# Timeouts (seconds)
implicit.wait=10
explicit.wait=20
page.load.timeout=30

# Screenshots on failure
screenshot.on.failure=true
screenshot.dir=test-output/screenshots

# Extent report
report.dir=test-output/reports
report.title=Trip Planner – QA Automation Report

# API – OpenWeatherMap  (set real key via env: OWM_API_KEY)
owm.base.url=https://api.openweathermap.org/data/2.5
owm.api.key=${OWM_API_KEY}

# API – Google Places  (set real key via env: GOOGLE_PLACES_KEY)
places.base.url=https://maps.googleapis.com/maps/api/place
places.api.key=${GOOGLE_PLACES_KEY}

# API – Amadeus flights  (set real keys via env vars)
amadeus.base.url=https://test.api.amadeus.com/v2
amadeus.client.id=${AMADEUS_CLIENT_ID}
amadeus.client.secret=${AMADEUS_CLIENT_SECRET}
