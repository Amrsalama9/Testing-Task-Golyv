# config-mock.properties
# Used when running API tests against local mock servers instead of real APIs.
# Start the mocks first: python mock-server/mock_servers.py
# Then run: mvn test -Papi-mock

browser=chrome
headless=true

google.base.url=https://www.google.com
google.flights.url=https://www.google.com/travel/flights

origin.city=Cairo
origin.iata=CAI
destination.city=Marsa Alam
destination.iata=RMF

weather.query=Marsa Alam weather
restaurant.query=restaurant near Marsa Alam

implicit.wait=10
explicit.wait=20
page.load.timeout=30

screenshot.on.failure=true
screenshot.dir=test-output/screenshots
report.dir=test-output/reports
report.title=Trip Planner QA Report

# Mock server URLs (local) - no real API keys needed
owm.base.url=http://localhost:9081/data/2.5
owm.api.key=mock_key_not_real

places.base.url=http://localhost:9082/v1
places.api.key=mock_key_not_real

amadeus.base.url=http://localhost:9083/v2
amadeus.client.id=mock_client_id
amadeus.client.secret=mock_client_secret
